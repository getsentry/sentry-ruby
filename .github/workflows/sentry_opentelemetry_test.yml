name: sentry-opentelemetry Test

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      matrix-result:
        description: "Matrix job result"
        value: ${{ jobs.test.outputs.matrix-result }}
# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: sentry-opentelemetry-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # test-matrix.json is the single source of truth for this gem's matrix.
      - id: set
        run: echo "include=$(jq -c . sentry-opentelemetry/test-matrix.json)" >> "$GITHUB_OUTPUT"

  test:
    needs: matrix
    defaults:
      run:
        working-directory: sentry-opentelemetry
    name: Ruby ${{ matrix.ruby_version }} & OpenTelemetry ${{ matrix.opentelemetry_version }}, options - ${{ toJson(matrix.options) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUBYOPT: ${{ matrix.options.rubyopt }}
      # Pin via the wrapper gemfile + its sibling .gemfile.lock (BUNDLE_LOCKFILE is unsupported on older bundlers).
      BUNDLE_GEMFILE: ${{ github.workspace }}/sentry-opentelemetry/gemfiles/ruby-${{ matrix.ruby_version }}.gemfile
      BUNDLE_FROZEN: "true"
      BUNDLE_WITHOUT: rubocop
      OPENTELEMETRY_VERSION: ${{ matrix.opentelemetry_version }}
      JRUBY_OPTS: "--debug" # for more accurate test coverage
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Wrapper keys the lock to this cell (<cell>.gemfile -> <cell>.gemfile.lock); must exist before setup-ruby.
      - name: Write wrapper gemfile
        run: |
          mkdir -p gemfiles
          echo 'eval_gemfile "../Gemfile"' > "$BUNDLE_GEMFILE"

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler: latest
          bundler-cache: true

      - name: Run specs
        run: bundle exec rake

      - name: Upload Coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
