name: Tests & CodeCov

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - \d+-\d+
  pull_request:

concurrency:
  group: tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  delayed_job-tests:
    uses: ./.github/workflows/sentry_delayed_job_test.yml
    secrets: inherit

  opentelemetry-tests:
    uses: ./.github/workflows/sentry_opentelemetry_test.yml
    secrets: inherit

  rails-tests:
    uses: ./.github/workflows/sentry_rails_test.yml
    secrets: inherit

  resque-tests:
    uses: ./.github/workflows/sentry_resque_test.yml
    secrets: inherit

  ruby-tests:
    uses: ./.github/workflows/sentry_ruby_test.yml
    secrets: inherit

  sidekiq-tests:
    uses: ./.github/workflows/sentry_sidekiq_test.yml
    secrets: inherit

  yabeda-tests:
    uses: ./.github/workflows/sentry_yabeda_test.yml
    secrets: inherit

  codecov:
    name: CodeCov
    runs-on: ubuntu-latest
    needs:
      - ruby-tests
      - rails-tests
      - sidekiq-tests
      - delayed_job-tests
      - resque-tests
      - opentelemetry-tests
      - yabeda-tests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Codecov
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3
        with:
          run_command: send-notifications
          token: ${{ secrets.CODECOV_TOKEN }}
