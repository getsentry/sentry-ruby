name: e2e tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.4.8"]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up `.env` file
        run: |
          cd .devcontainer
          cp .env.example .env
          echo "RUBY_VERSION=${{ matrix.ruby_version }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build test container image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: sentry-ruby-devcontainer:latest
          build-args: |
            RUBY_VERSION=${{ matrix.ruby_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore node_modules cache
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: spec/apps/svelte-mini/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('spec/apps/svelte-mini/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node-modules-

      - name: Set up test container
        run: |
          docker compose \
            --file .devcontainer/docker-compose.yml \
            --env-file .devcontainer/.env \
            run --rm sentry-test \
            .devcontainer/setup --only .,spec/apps/rails-mini

      - name: Start test services
        run: |
          docker compose \
            --file .devcontainer/docker-compose.yml \
            --env-file .devcontainer/.env \
            up -d --no-build sentry-test

      - name: "Wait for rails-mini app to be ready"
        uses: nev7n/wait_for_response@81b0b0eded16435202e126beb3e704fc00430f5b # v1
        with:
          url: 'http://localhost:4000/health'
          responseCode: 200
          timeout: 90000
          interval: 500

      - name: "Wait for svelte-mini app to be ready"
        uses: nev7n/wait_for_response@81b0b0eded16435202e126beb3e704fc00430f5b # v1
        with:
          url: 'http://localhost:4001/health'
          responseCode: 200
          timeout: 90000
          interval: 500

      - name: Run e2e tests via sentry-test
        run: |
          docker compose \
            --file .devcontainer/docker-compose.yml \
            --env-file .devcontainer/.env \
            exec sentry-test \
            bundle exec rake

      - name: Stop e2e services
        if: always()
        run: docker compose --file .devcontainer/docker-compose.yml down

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-test-logs-ruby-${{ matrix.ruby_version }}
          path: |
            log/sentry_debug_events.log
          retention-days: 7
