name: sentry-ruby Test

on:
  workflow_dispatch:
  workflow_call:
# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: sentry-ruby-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # test-matrix.json is the single source of truth for this gem's matrix.
      - id: set
        run: echo "include=$(jq -c . sentry-ruby/test-matrix.json)" >> "$GITHUB_OUTPUT"

  test:
    needs: matrix
    defaults:
      run:
        working-directory: sentry-ruby
    name: Ruby ${{ matrix.ruby_version }} & Rack ${{ matrix.rack_version }}, options - ${{ toJson(matrix.options) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: ghcr.io/getsentry/image-mirror-library-redis:7.0.8-bullseye
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUBYOPT: ${{ matrix.options.rubyopt }}
      # Pin via the wrapper gemfile + its sibling .gemfile.lock (BUNDLE_LOCKFILE is unsupported on older bundlers).
      BUNDLE_GEMFILE: ${{ github.workspace }}/sentry-ruby/gemfiles/ruby-${{ matrix.ruby_version }}_rack-${{ matrix.rack_version }}_redis-${{ matrix.redis_rb_version }}.gemfile
      BUNDLE_FROZEN: "true"
      BUNDLE_WITHOUT: rubocop
      RACK_VERSION: ${{ matrix.rack_version }}
      REDIS_RB_VERSION: ${{ matrix.redis_rb_version }}
      JRUBY_OPTS: "--debug" # for more accurate test coverage
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Wrapper keys the lock to this cell (<cell>.gemfile -> <cell>.gemfile.lock); must exist before setup-ruby.
      - name: Write wrapper gemfile
        run: |
          mkdir -p gemfiles
          echo 'eval_gemfile "../Gemfile"' > "$BUNDLE_GEMFILE"

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler: latest
          bundler-cache: true

      - name: Run specs with Rack ${{ matrix.rack_version }} and redis-rb ${{ matrix.redis_rb_version }}
        run: bundle exec rake

      - name: Upload Coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
